kind = "mobile"
previewPath = "/mobile/"
title = "PromptAtrium Mobile"
version = "1.0.0"
id = "artifacts/prompt-atrium-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25873

[services.development]
run = "pnpm --filter @workspace/prompt-atrium-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prompt-atrium-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/prompt-atrium-mobile", "run", "serve" ]

[services.env]
PORT = "25873"
BASE_PATH = "/mobile/"
