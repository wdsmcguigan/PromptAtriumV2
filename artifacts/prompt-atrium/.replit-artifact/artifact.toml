kind = "web"
previewPath = "/"
title = "PromptAtrium"
version = "1.0.0"
id = "artifacts/prompt-atrium"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19608

[services.development]
run = "pnpm --filter @workspace/prompt-atrium run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prompt-atrium", "run", "build" ]
publicDir = "artifacts/prompt-atrium/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19608"
BASE_PATH = "/"
