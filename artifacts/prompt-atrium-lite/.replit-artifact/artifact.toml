kind = "web"
previewPath = "/prompt-atrium-lite/"
title = "PromptAtriumLite"
version = "1.0.0"
id = "artifacts/prompt-atrium-lite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/prompt-atrium-lite/" ]
localPort = 19854

[services.development]
run = "pnpm --filter @workspace/prompt-atrium-lite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prompt-atrium-lite", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/prompt-atrium-lite", "run", "serve" ]

[services.env]
PORT = "19854"
BASE_PATH = "/prompt-atrium-lite/"
